<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — Task Management</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060608;
  --bg2: #0d0d12;
  --bg3: #13131a;
  --card: #0f0f16;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.11);
  --text: #eeeef5;
  --muted: #7070a0;
  --muted2: #4a4a6a;
  --accent: #6c63ff;
  --accent2: #9b8fff;
  --green: #22d3a5;
  --amber: #fbbf24;
  --red: #f87171;
  --blue: #60a5fa;
  --pink: #f472b6;
  --font: 'Plus Jakarta Sans', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --r: 10px;
  --r2: 16px;
  --r3: 24px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow2: 0 8px 48px rgba(0,0,0,0.6);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* GRID BG */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(108,99,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(108,99,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none; z-index: 0;
}

/* ─── AUTH SCREEN ─── */
#authScreen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  position: relative;
  z-index: 1;
}

.auth-orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(100px);
  pointer-events: none;
}
.orb1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(108,99,255,0.2) 0%, transparent 70%); top: -150px; right: -100px; }
.orb2 { width: 350px; height: 350px; background: radial-gradient(circle, rgba(34,211,165,0.12) 0%, transparent 70%); bottom: -100px; left: 0; }

.auth-box {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: var(--r3);
  padding: 3rem;
  width: 100%;
  max-width: 440px;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow2);
}

.auth-box::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--green), var(--pink));
}

.auth-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 2rem;
}

.auth-logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
}

.auth-logo-text {
  font-size: 1.3rem;
  font-weight: 800;
  letter-spacing: -0.03em;
}

.auth-logo-text span { color: var(--accent2); }

.auth-tabs {
  display: flex;
  background: var(--bg3);
  border-radius: var(--r);
  padding: 4px;
  margin-bottom: 2rem;
  gap: 4px;
}

.auth-tab {
  flex: 1;
  padding: 0.6rem;
  border: none;
  border-radius: 8px;
  background: transparent;
  color: var(--muted);
  font-family: var(--font);
  font-size: 0.875rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.auth-tab.active {
  background: var(--accent);
  color: white;
}

.auth-form { display: flex; flex-direction: column; gap: 1rem; }

.form-group { display: flex; flex-direction: column; gap: 6px; }

.form-label {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.form-input {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 0.8rem 1rem;
  color: var(--text);
  font-family: var(--font);
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  width: 100%;
}

.form-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
}

.form-input::placeholder { color: var(--muted2); }

.auth-btn {
  padding: 0.85rem;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: var(--r);
  color: white;
  font-family: var(--font);
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.2s;
  margin-top: 0.5rem;
  letter-spacing: 0.01em;
}

.auth-btn:hover { opacity: 0.92; transform: translateY(-1px); }

.auth-divider {
  display: flex;
  align-items: center;
  gap: 1rem;
  color: var(--muted2);
  font-size: 0.8rem;
  margin: 0.5rem 0;
}
.auth-divider::before, .auth-divider::after {
  content: ''; flex: 1;
  height: 1px; background: var(--border);
}

.demo-hint {
  background: rgba(108,99,255,0.08);
  border: 1px solid rgba(108,99,255,0.2);
  border-radius: var(--r);
  padding: 0.75rem 1rem;
  font-size: 0.8rem;
  color: var(--accent2);
  text-align: center;
  font-family: var(--mono);
}

.auth-error {
  background: rgba(248,113,113,0.1);
  border: 1px solid rgba(248,113,113,0.3);
  border-radius: var(--r);
  padding: 0.75rem 1rem;
  font-size: 0.85rem;
  color: var(--red);
  display: none;
}

/* ─── MAIN APP ─── */
#appScreen { display: none; min-height: 100vh; position: relative; z-index: 1; }

/* SIDEBAR */
.layout { display: flex; min-height: 100vh; }

.sidebar {
  width: 260px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 50;
  transition: transform 0.3s;
}

.sidebar-header {
  padding: 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.sidebar-logo {
  display: flex; align-items: center; gap: 10px;
  font-weight: 800; font-size: 1.1rem; letter-spacing: -0.02em;
}

.logo-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
}

.sidebar-user {
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}

.user-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--pink));
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.9rem; color: white;
  flex-shrink: 0;
}

.user-info { flex: 1; min-width: 0; }
.user-name { font-weight: 600; font-size: 0.875rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-role { font-size: 0.75rem; color: var(--muted); }

.sidebar-nav { flex: 1; padding: 1rem 0.75rem; display: flex; flex-direction: column; gap: 2px; }

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 0.65rem 0.85rem;
  border-radius: var(--r);
  color: var(--muted);
  font-size: 0.875rem; font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  border: none; background: transparent; width: 100%; text-align: left;
  font-family: var(--font);
}

.nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
.nav-item.active { background: rgba(108,99,255,0.12); color: var(--accent2); }

.nav-item svg { flex-shrink: 0; }

.nav-badge {
  margin-left: auto;
  background: var(--accent);
  color: white;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 100px;
  min-width: 20px;
  text-align: center;
}

.nav-section-label {
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--muted2);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.75rem 0.85rem 0.4rem;
}

.sidebar-footer {
  padding: 1rem 0.75rem;
  border-top: 1px solid var(--border);
}

.logout-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 0.65rem 0.85rem;
  border-radius: var(--r);
  color: var(--muted);
  font-size: 0.875rem; font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  border: none; background: transparent; width: 100%; text-align: left;
  font-family: var(--font);
}

.logout-btn:hover { background: rgba(248,113,113,0.08); color: var(--red); }

/* MAIN CONTENT */
.main { margin-left: 260px; flex: 1; display: flex; flex-direction: column; }

.topbar {
  background: rgba(6,6,8,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 1rem 2rem;
  display: flex; align-items: center; gap: 1rem;
  position: sticky; top: 0; z-index: 40;
}

.topbar-title { font-size: 1.1rem; font-weight: 700; flex: 1; }

.search-box {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 0.5rem 0.85rem;
  min-width: 220px;
}

.search-box input {
  background: transparent; border: none; outline: none;
  color: var(--text); font-family: var(--font); font-size: 0.875rem;
  width: 100%;
}

.search-box input::placeholder { color: var(--muted2); }

.add-task-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 0.55rem 1.1rem;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; border-radius: var(--r);
  color: white; font-family: var(--font); font-size: 0.875rem; font-weight: 700;
  cursor: pointer; transition: opacity 0.2s, transform 0.2s; white-space: nowrap;
}

.add-task-btn:hover { opacity: 0.9; transform: translateY(-1px); }

.hamburger {
  display: none; background: none; border: none; color: var(--text);
  cursor: pointer; padding: 4px;
}

/* CONTENT AREA */
.content { padding: 2rem; flex: 1; }

/* STATS ROW */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1rem;
  margin-bottom: 2rem;
}

.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 1.25rem 1.5rem;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s, transform 0.2s;
}

.stat-card:hover { border-color: var(--border2); transform: translateY(-2px); }

.stat-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
}

.stat-card.total::before { background: var(--accent); }
.stat-card.inprogress::before { background: var(--amber); }
.stat-card.done::before { background: var(--green); }
.stat-card.overdue::before { background: var(--red); }

.stat-icon {
  width: 38px; height: 38px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; margin-bottom: 0.75rem;
}

.stat-num {
  font-size: 2rem; font-weight: 800; letter-spacing: -0.04em;
  font-family: var(--mono); line-height: 1;
}

.stat-label { font-size: 0.78rem; color: var(--muted); margin-top: 4px; font-weight: 500; }

/* VIEW TOGGLE */
.view-controls {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;
}

.view-tabs {
  display: flex;
  background: var(--bg3);
  border-radius: var(--r);
  padding: 3px; gap: 3px;
}

.view-tab {
  padding: 0.5rem 1rem;
  border: none; border-radius: 8px;
  background: transparent; color: var(--muted);
  font-family: var(--font); font-size: 0.8rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; gap: 6px;
}

.view-tab.active { background: var(--bg2); color: var(--text); box-shadow: var(--shadow); }

.filter-row { display: flex; gap: 8px; flex-wrap: wrap; }

.filter-btn {
  padding: 0.4rem 0.85rem;
  border-radius: 100px;
  border: 1px solid var(--border2);
  background: transparent; color: var(--muted);
  font-family: var(--font); font-size: 0.78rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}

.filter-btn:hover { border-color: var(--accent); color: var(--accent2); }
.filter-btn.active { background: rgba(108,99,255,0.12); border-color: var(--accent); color: var(--accent2); }

/* LIST VIEW */
#listView { display: block; }

.task-list { display: flex; flex-direction: column; gap: 8px; }

.task-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 1rem 1.25rem;
  display: flex; align-items: center; gap: 1rem;
  transition: all 0.2s; cursor: pointer;
  position: relative; overflow: hidden;
}

.task-item:hover { border-color: var(--border2); background: var(--bg3); transform: translateX(3px); }

.task-item.done-item { opacity: 0.6; }

.task-check {
  width: 20px; height: 20px; border-radius: 6px;
  border: 2px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; cursor: pointer; transition: all 0.2s;
}

.task-check.checked { background: var(--green); border-color: var(--green); }
.task-check svg { display: none; }
.task-check.checked svg { display: block; }

.task-info { flex: 1; min-width: 0; }

.task-title {
  font-weight: 600; font-size: 0.9rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.task-item.done-item .task-title { text-decoration: line-through; color: var(--muted); }

.task-meta {
  display: flex; align-items: center; gap: 0.75rem;
  margin-top: 4px; flex-wrap: wrap;
}

.task-tag {
  padding: 2px 8px; border-radius: 100px;
  font-size: 0.7rem; font-weight: 700; letter-spacing: 0.04em;
}

.task-date {
  font-size: 0.75rem; color: var(--muted);
  display: flex; align-items: center; gap: 4px;
  font-family: var(--mono);
}

.task-date.overdue { color: var(--red); }

.task-priority {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}

.task-actions {
  display: flex; gap: 6px; opacity: 0; transition: opacity 0.2s;
}

.task-item:hover .task-actions { opacity: 1; }

.task-action-btn {
  width: 30px; height: 30px; border-radius: 8px;
  background: var(--bg2); border: 1px solid var(--border2);
  color: var(--muted); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; font-size: 0.8rem;
}

.task-action-btn:hover { color: var(--text); border-color: var(--accent); }
.task-action-btn.del:hover { color: var(--red); border-color: var(--red); }

/* KANBAN VIEW */
#kanbanView { display: none; }

.kanban-board {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1rem;
  min-height: 400px;
  align-items: start;
}

.kanban-col {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 1rem;
  min-height: 300px;
}

.col-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1rem; padding-bottom: 0.75rem;
  border-bottom: 1px solid var(--border);
}

.col-title {
  display: flex; align-items: center; gap: 8px;
  font-weight: 700; font-size: 0.875rem;
}

.col-dot { width: 8px; height: 8px; border-radius: 50%; }
.col-count { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); background: var(--bg3); padding: 2px 8px; border-radius: 100px; }

.kanban-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 0.85rem;
  margin-bottom: 8px;
  cursor: grab; transition: all 0.2s;
  position: relative; overflow: hidden;
}

.kanban-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
}

.kanban-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: var(--shadow); }

.kanban-card-title { font-weight: 600; font-size: 0.85rem; margin-bottom: 0.5rem; line-height: 1.4; }

.kanban-card-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 0.5rem;
}

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
  z-index: 200; display: flex; align-items: center; justify-content: center;
  padding: 1rem; opacity: 0; pointer-events: none; transition: opacity 0.25s;
}

.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--r3);
  padding: 2rem;
  max-width: 520px; width: 100%;
  transform: translateY(16px) scale(0.98);
  transition: all 0.25s;
  position: relative; overflow: hidden;
  max-height: 90vh; overflow-y: auto;
}

.modal::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--pink));
}

.modal-overlay.open .modal { transform: translateY(0) scale(1); }

.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.modal-title { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em; }
.modal-close { background: var(--bg3); border: 1px solid var(--border2); color: var(--muted); width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: color 0.2s; }
.modal-close:hover { color: var(--text); }

.modal-form { display: flex; flex-direction: column; gap: 1rem; }

.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

.form-select {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 0.8rem 1rem;
  color: var(--text); font-family: var(--font); font-size: 0.9rem;
  outline: none; transition: border-color 0.2s; width: 100%;
  cursor: pointer;
}

.form-select:focus { border-color: var(--accent); }
.form-select option { background: var(--bg2); }

.form-textarea {
  background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--r);
  padding: 0.8rem 1rem; color: var(--text); font-family: var(--font); font-size: 0.9rem;
  outline: none; transition: border-color 0.2s; width: 100%; resize: vertical; min-height: 80px;
}

.form-textarea:focus { border-color: var(--accent); }
.form-textarea::placeholder { color: var(--muted2); }

.priority-picker { display: flex; gap: 8px; }

.priority-opt {
  flex: 1; padding: 0.5rem;
  border-radius: var(--r); border: 1px solid var(--border2);
  background: transparent; cursor: pointer; font-family: var(--font);
  font-size: 0.78rem; font-weight: 600; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}

.priority-opt.selected-low { background: rgba(34,211,165,0.12); border-color: var(--green); color: var(--green); }
.priority-opt.selected-medium { background: rgba(251,191,36,0.12); border-color: var(--amber); color: var(--amber); }
.priority-opt.selected-high { background: rgba(248,113,113,0.12); border-color: var(--red); color: var(--red); }

.modal-save-btn {
  padding: 0.85rem;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; border-radius: var(--r);
  color: white; font-family: var(--font); font-size: 0.95rem; font-weight: 700;
  cursor: pointer; transition: opacity 0.2s; width: 100%; margin-top: 0.5rem;
}

.modal-save-btn:hover { opacity: 0.9; }

/* TOAST */
.toast {
  position: fixed; bottom: 2rem; right: 2rem;
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--r); padding: 0.85rem 1.25rem;
  font-size: 0.875rem; font-weight: 500; z-index: 300;
  transform: translateY(80px); opacity: 0; transition: all 0.3s;
  display: flex; align-items: center; gap: 10px; min-width: 240px;
  box-shadow: var(--shadow2);
}

.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-left: 3px solid var(--green); }
.toast.error { border-left: 3px solid var(--red); }
.toast.info { border-left: 3px solid var(--accent); }

/* REAL-TIME INDICATOR */
.realtime-badge {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.75rem; color: var(--green); font-weight: 600;
  padding: 4px 10px; background: rgba(34,211,165,0.08);
  border: 1px solid rgba(34,211,165,0.2); border-radius: 100px;
}

.rt-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--green);
  box-shadow: 0 0 8px var(--green); animation: pulse 2s ease infinite;
}

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* EMPTY STATE */
.empty-state {
  text-align: center; padding: 4rem 2rem;
  color: var(--muted);
}

.empty-icon { font-size: 3rem; margin-bottom: 1rem; }

/* DETAIL PANEL */
.detail-panel {
  position: fixed; right: 0; top: 0; bottom: 0; width: 380px;
  background: var(--bg2); border-left: 1px solid var(--border2);
  z-index: 60; transform: translateX(100%); transition: transform 0.3s;
  display: flex; flex-direction: column; overflow: hidden;
}

.detail-panel.open { transform: translateX(0); }

.detail-header {
  padding: 1.5rem; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: relative;
}

.detail-header::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;

}

.detail-body { flex: 1; overflow-y: auto; padding: 1.5rem; }

.detail-section { margin-bottom: 1.5rem; }
.detail-section-label { font-size: 0.7rem; font-weight: 700; color: var(--muted2); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.5rem; }

/* PROGRESS BAR */

.progress-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, var(--accent), var(--green)); transition: width 0.5s; }

/* MOBILE */

<script>
// ═══════════════════════════════════════
// DATABASE (localStorage as backend DB)
// ═══════════════════════════════════════
const DB_USERS = 'tf_users';
const DB_TASKS = 'tf_tasks';
const DB_SESSION = 'tf_session';

function getUsers() { try { return JSON.parse(localStorage.getItem(DB_USERS)) || []; } catch { return []; } }
function saveUsers(u) { localStorage.setItem(DB_USERS, JSON.stringify(u)); }
function getTasks() { try { return JSON.parse(localStorage.getItem(DB_TASKS)) || []; } catch { return []; } }
function saveTasks(t) { localStorage.setItem(DB_TASKS, JSON.stringify(t)); }
function getSession() { try { return JSON.parse(localStorage.getItem(DB_SESSION)); } catch { return null; } }
function saveSession(s) { localStorage.setItem(DB_SESSION, JSON.stringify(s)); }
function clearSession() { localStorage.removeItem(DB_SESSION); }

// Init demo user & tasks
function initDB() {
  const users = getUsers();
  if (!users.find(u => u.email === 'demo@taskflow.app')) {
    users.push({ id: 1, name: 'Rajesh Soyeda', email: 'demo@taskflow.app', password: 'demo123' });
    saveUsers(users);
  }
  if (getTasks().length === 0) {
    const today = new Date().toISOString().split('T')[0];
    const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];
    const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
    saveTasks([
      { id: 1, title: 'Set up project structure', desc: 'Initialize React app, install dependencies, configure routing and state management.', category: 'work', status: 'done', priority: 'high', due: yesterday, created: Date.now() - 200000, userId: 1 },
      { id: 2, title: 'Design database schema', desc: 'Design MongoDB collections for users, tasks, and notifications with proper indexing.', category: 'work', status: 'done', priority: 'high', due: yesterday, created: Date.now() - 180000, userId: 1 },
      { id: 3, title: 'Build authentication API', desc: 'Implement JWT-based login, register, and token refresh endpoints using Express.js.', category: 'work', status: 'inprogress', priority: 'high', due: today, created: Date.now() - 150000, userId: 1 },
      { id: 4, title: 'Create task CRUD endpoints', desc: 'Build RESTful API for creating, reading, updating, and deleting tasks.', category: 'work', status: 'inprogress', priority: 'medium', due: today, created: Date.now() - 120000, userId: 1 },
      { id: 5, title: 'Study Data Structures', desc: 'Complete chapter on trees and graphs. Solve 10 LeetCode problems.', category: 'study', status: 'todo', priority: 'medium', due: tomorrow, created: Date.now() - 90000, userId: 1 },
      { id: 6, title: 'Update portfolio README', desc: 'Add project screenshots, tech stack badges, and deployment guide.', category: 'personal', status: 'review', priority: 'low', due: tomorrow, created: Date.now() - 60000, userId: 1 },
      { id: 7, title: 'Deploy to Vercel', desc: 'Configure environment variables, set up CI/CD pipeline, and deploy the app.', category: 'work', status: 'todo', priority: 'high', due: yesterday, created: Date.now() - 30000, userId: 1 },
      { id: 8, title: 'Practice aptitude questions', desc: 'Solve 20 quantitative and logical reasoning questions for placement prep.', category: 'study', status: 'todo', priority: 'medium', due: tomorrow, created: Date.now() - 10000, userId: 1 },
    ]);
  }
}

// ═══════════════════════════════════════
// AUTH
// ═══════════════════════════════════════
let currentUser = null;
let currentView = 'all';
let currentFilter = 'all';
let currentViewMode = 'list';
let selectedPriority = 'medium';
let editingId = null;

function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')));
  document.getElementById('loginForm').style.display = tab === 'login' ? 'flex' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'flex' : 'none';
  document.getElementById('authError').style.display = 'none';
}

function showAuthError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg;
  el.style.display = 'block';
}

function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  if (!email || !pass) { showAuthError('Please fill all fields.'); return; }
  const users = getUsers();
  const user = users.find(u => u.email === email && u.password === pass);
  if (!user) { showAuthError('Invalid email or password.'); return; }
  saveSession(user);
  startApp(user);
}

function handleRegister() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass = document.getElementById('regPass').value;
  if (!name || !email || !pass) { showAuthError('Please fill all fields.'); return; }
  if (pass.length < 6) { showAuthError('Password must be at least 6 characters.'); return; }
  const users = getUsers();
  if (users.find(u => u.email === email)) { showAuthError('Email already registered.'); return; }
  const newUser = { id: Date.now(), name, email, password: pass };
  users.push(newUser);
  saveUsers(newUser);
  saveSession(newUser);
  startApp(newUser);
}

function handleLogout() {
  clearSession();
  currentUser = null;
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
  showToast('Signed out successfully.', 'info');
}

function startApp(user) {
  currentUser = user;
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  document.getElementById('userName').textContent = user.name.split(' ')[0];
  document.getElementById('userAvatar').textContent = user.name.charAt(0).toUpperCase();
  updateStats();
  renderTasks();
  showToast(`Welcome back, ${user.name.split(' ')[0]}! 👋`, 'success');
  // Simulate real-time (WebSocket simulation)
  startRealtime();
}

// ═══════════════════════════════════════
// REAL-TIME SIMULATION (WebSocket-like)
// ═══════════════════════════════════════
function startRealtime() {
  // Simulate real-time updates every 30s (in real app: WebSocket)
  setInterval(() => {
    updateStats();
    renderTasks();
  }, 30000);
}

// ═══════════════════════════════════════
// TASK LOGIC
// ═══════════════════════════════════════
function getUserTasks() {
  return getTasks().filter(t => t.userId === currentUser.id);
}

function isOverdue(task) {
  if (!task.due || task.status === 'done') return false;
  return new Date(task.due) < new Date(new Date().toDateString());
}

function isToday(task) {
  if (!task.due) return false;
  return task.due === new Date().toISOString().split('T')[0];
}

function getFilteredTasks() {
  let tasks = getUserTasks();
  const q = document.getElementById('searchInput')?.value?.toLowerCase() || '';
  if (q) tasks = tasks.filter(t => t.title.toLowerCase().includes(q) || t.desc?.toLowerCase().includes(q));
  // View filter
  if (currentView === 'today') tasks = tasks.filter(t => isToday(t));
  else if (currentView === 'pending') tasks = tasks.filter(t => t.status === 'inprogress' || t.status === 'todo');
  else if (currentView === 'done') tasks = tasks.filter(t => t.status === 'done');
  else if (currentView === 'overdue') tasks = tasks.filter(t => isOverdue(t));
  else if (['work','personal','study','other'].includes(currentView)) tasks = tasks.filter(t => t.category === currentView);
  // Priority filter
  if (currentFilter !== 'all') tasks = tasks.filter(t => t.priority === currentFilter);
  return tasks.sort((a, b) => {
    const pOrder = { high: 0, medium: 1, low: 2 };
    return (pOrder[a.priority] - pOrder[b.priority]) || (b.created - a.created);
  });
}

function updateStats() {
  const tasks = getUserTasks();
  const done = tasks.filter(t => t.status === 'done').length;
  const progress = tasks.filter(t => t.status === 'inprogress').length;
  const overdue = tasks.filter(t => isOverdue(t)).length;
  const total = tasks.length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statProgress').textContent = progress;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statOverdue').textContent = overdue;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('allBadge').textContent = total;
  const todayCount = tasks.filter(t => isToday(t)).length;
  document.getElementById('todayBadge').textContent = todayCount;
  const overdueB = document.getElementById('overdueBadge');
  overdueB.textContent = overdue;
  overdueB.style.display = overdue > 0 ? 'inline' : 'none';
}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
const CATEGORY_COLORS = {
  work: { bg: 'rgba(108,99,255,0.15)', color: '#9b8fff' },
  personal: { bg: 'rgba(244,114,182,0.15)', color: '#f472b6' },
  study: { bg: 'rgba(96,165,250,0.15)', color: '#60a5fa' },
  other: { bg: 'rgba(251,191,36,0.15)', color: '#fbbf24' },
};

const PRIORITY_COLORS = { high: '#f87171', medium: '#fbbf24', low: '#22d3a5' };

function formatDate(d) {
  if (!d) return '';
  const date = new Date(d + 'T00:00:00');
  return date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
}

function renderTasks() {
  if (currentViewMode === 'list') renderList();
  else renderKanban();
}

function renderList() {
  const tasks = getFilteredTasks();
  const list = document.getElementById('taskList');
  if (tasks.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">No tasks found</div><div class="empty-sub">Click "New Task" to add one!</div></div>`;
    return;
  }
  list.innerHTML = tasks.map(t => {
    const cat = CATEGORY_COLORS[t.category] || CATEGORY_COLORS.other;
    const isOD = isOverdue(t);
    return `
    <div class="task-item ${t.status === 'done' ? 'done-item' : ''}" onclick="openDetail(${t.id})">
      <div class="task-check ${t.status === 'done' ? 'checked' : ''}" onclick="event.stopPropagation(); toggleDone(${t.id})">
        <svg width="11" height="11" fill="none" stroke="white" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="task-priority" style="background:${PRIORITY_COLORS[t.priority]}"></div>
      <div class="task-info">
        <div class="task-title">${t.title}</div>
        <div class="task-meta">
          <span class="task-tag" style="background:${cat.bg};color:${cat.color}">${t.category}</span>
          <span class="task-tag" style="background:${getStatusBg(t.status)};color:${getStatusColor(t.status)}">${getStatusLabel(t.status)}</span>
          ${t.due ? `<span class="task-date ${isOD ? 'overdue' : ''}">
            <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${isOD ? '⚠ ' : ''}${formatDate(t.due)}</span>` : ''}
        </div>
      </div>
      <div class="task-actions">
        <button class="task-action-btn" onclick="event.stopPropagation(); editTask(${t.id})" title="Edit">✏️</button>
        <button class="task-action-btn del" onclick="event.stopPropagation(); deleteTask(${t.id})" title="Delete">🗑</button>
      </div>
    </div>`;
  }).join('');
}

function getStatusLabel(s) { return { todo: 'To Do', inprogress: 'In Progress', review: 'Review', done: 'Done' }[s] || s; }
function getStatusBg(s) { return { todo: 'rgba(112,112,160,0.15)', inprogress: 'rgba(96,165,250,0.15)', review: 'rgba(251,191,36,0.15)', done: 'rgba(34,211,165,0.15)' }[s]; }
function getStatusColor(s) { return { todo: '#7070a0', inprogress: '#60a5fa', review: '#fbbf24', done: '#22d3a5' }[s]; }

function renderKanban() {
  const tasks = getUserTasks();
  const cols = { todo: [], inprogress: [], review: [], done: [] };
  tasks.forEach(t => { if (cols[t.status]) cols[t.status].push(t); });

  Object.entries(cols).forEach(([status, items]) => {
    const el = document.getElementById(`k-${status}`);
    const cnt = document.getElementById(`k-${status}-count`);
    if (!el) return;
    cnt.textContent = items.length;
    if (items.length === 0) {
      el.innerHTML = `<div style="text-align:center;padding:1.5rem;color:var(--muted2);font-size:0.8rem">Drop tasks here</div>`;
      return;
    }
    el.innerHTML = items.map(t => {
      const cat = CATEGORY_COLORS[t.category] || CATEGORY_COLORS.other;
      return `
      <div class="kanban-card" onclick="openDetail(${t.id})" style="--card-color:${PRIORITY_COLORS[t.priority]}">
        <div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${PRIORITY_COLORS[t.priority]};border-radius:4px 0 0 4px"></div>
        <div style="padding-left:8px">
          <div class="kanban-card-title">${t.title}</div>
          <div class="kanban-card-footer">
            <span class="task-tag" style="background:${cat.bg};color:${cat.color};font-size:0.68rem;padding:2px 7px">${t.category}</span>
            ${t.due ? `<span style="font-size:0.7rem;color:${isOverdue(t) ? 'var(--red)' : 'var(--muted)'};font-family:var(--mono)">${formatDate(t.due)}</span>` : ''}
          </div>
        </div>
      </div>`;
    }).join('');
  });
}

// ═══════════════════════════════════════
// TASK CRUD
// ═══════════════════════════════════════
function saveTask() {
  const title = document.getElementById('tTitle').value.trim();
  if (!title) { showToast('Task title is required!', 'error'); return; }
  const tasks = getTasks();
  const id = editingId || Date.now();

  if (editingId) {
    const idx = tasks.findIndex(t => t.id === editingId);
    if (idx !== -1) {
      tasks[idx] = { ...tasks[idx], title, desc: document.getElementById('tDesc').value, category: document.getElementById('tCategory').value, status: document.getElementById('tStatus').value, priority: selectedPriority, due: document.getElementById('tDue').value, updated: Date.now() };
    }
    showToast('Task updated!', 'success');
  } else {
    tasks.push({ id, title, desc: document.getElementById('tDesc').value, category: document.getElementById('tCategory').value, status: document.getElementById('tStatus').value, priority: selectedPriority, due: document.getElementById('tDue').value, created: Date.now(), userId: currentUser.id });
    showToast('Task added!', 'success');
  }

  saveTasks(tasks);
  closeModal();
  updateStats();
  renderTasks();
}

function toggleDone(id) {
  const tasks = getTasks();
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.status = t.status === 'done' ? 'todo' : 'done';
  saveTasks(tasks);
  updateStats();
  renderTasks();
  showToast(t.status === 'done' ? 'Task completed! ✅' : 'Task reopened.', 'info');
}

function deleteTask(id) {
  const tasks = getTasks().filter(t => t.id !== id);
  saveTasks(tasks);
  updateStats();
  renderTasks();
  closeDetail();
  showToast('Task deleted.', 'error');
}

function editTask(id) {
  const task = getTasks().find(t => t.id === id);
  if (!task) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Edit Task';
  document.getElementById('tTitle').value = task.title;
  document.getElementById('tDesc').value = task.desc || '';
  document.getElementById('tCategory').value = task.category;
  document.getElementById('tStatus').value = task.status;
  document.getElementById('tDue').value = task.due || '';
  setPriority(task.priority);
  openModal(true);
}

// ═══════════════════════════════════════
// DETAIL PANEL
// ═══════════════════════════════════════
function openDetail(id) {
  const task = getTasks().find(t => t.id === id);
  if (!task) return;
  const cat = CATEGORY_COLORS[task.category] || CATEGORY_COLORS.other;
  document.getElementById('detailBody').innerHTML = `
    <div style="margin-bottom:1.5rem">
      <div style="font-family:var(--font);font-weight:700;font-size:1.05rem;line-height:1.4;margin-bottom:0.75rem">${task.title}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <span class="task-tag" style="background:${cat.bg};color:${cat.color}">${task.category}</span>
        <span class="task-tag" style="background:${getStatusBg(task.status)};color:${getStatusColor(task.status)}">${getStatusLabel(task.status)}</span>
        <span class="task-tag" style="background:rgba(0,0,0,0.2);color:${PRIORITY_COLORS[task.priority]}">● ${task.priority} priority</span>
      </div>
    </div>
    ${task.desc ? `<div class="detail-section"><div class="detail-section-label">Description</div><div class="detail-desc">${task.desc}</div></div>` : ''}
    <div class="detail-section"><div class="detail-section-label">Due Date</div><div class="detail-value" style="color:${isOverdue(task) ? 'var(--red)' : 'var(--text)'}">${task.due ? formatDate(task.due) : 'No due date'} ${isOverdue(task) ? '⚠ Overdue' : ''}</div></div>
    <div class="detail-section"><div class="detail-section-label">Created</div><div class="detail-value">${new Date(task.created).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}</div></div>
    <div style="display:flex;gap:8px;margin-top:2rem">
      <button class="modal-save-btn" style="flex:1" onclick="editTask(${task.id}); closeDetail()">Edit Task</button>
      <button onclick="deleteTask(${task.id})" style="flex:1;padding:0.85rem;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:var(--r);color:var(--red);font-family:var(--font);font-weight:700;cursor:pointer;font-size:0.9rem">Delete</button>
    </div>`;
  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() { document.getElementById('detailPanel').classList.remove('open'); }

// ═══════════════════════════════════════
// UI CONTROLS
// ═══════════════════════════════════════
function openModal(isEdit = false) {
  if (!isEdit) {
    editingId = null;
    document.getElementById('modalTitle').textContent = 'New Task';
    document.getElementById('tTitle').value = '';
    document.getElementById('tDesc').value = '';
    document.getElementById('tCategory').value = 'work';
    document.getElementById('tStatus').value = 'todo';
    document.getElementById('tDue').value = new Date().toISOString().split('T')[0];
    setPriority('medium');
  }
  document.getElementById('taskModal').classList.add('open');
}

function closeModal() { document.getElementById('taskModal').classList.remove('open'); }
function closeModalOutside(e) { if (e.target.id === 'taskModal') closeModal(); }

function setPriority(p) {
  selectedPriority = p;
  ['low','medium','high'].forEach(x => {
    const btn = document.getElementById(`p-${x}`);
    btn.className = `priority-opt${p === x ? ` selected-${x}` : ''}`;
  });
}

function setView(view, el) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  const labels = { all: 'All Tasks', today: "Today's Tasks", pending: 'In Progress', done: 'Completed', overdue: 'Overdue', work: 'Work', personal: 'Personal', study: 'Study' };
  document.getElementById('topbarTitle').textContent = labels[view] || view;
  closeSidebar();
  renderTasks();
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderTasks();
}

function switchViewMode(mode, el) {
  currentViewMode = mode;
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('listView').style.display = mode === 'list' ? 'block' : 'none';
  document.getElementById('kanbanView').style.display = mode === 'kanban' ? 'block' : 'none';
  renderTasks();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
}

function showToast(msg, type = 'success') {
  const toast = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toastIcon').textContent = type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ';
  toast.className = `toast ${type} show`;
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  initDB();
  // Check existing session
  const session = getSession();
  if (session) {
    startApp(session);
  }
  // Enter key support
  document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  document.getElementById('loginEmail').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
});
</script>
